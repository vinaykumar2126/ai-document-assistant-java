spring.application.name=ai-powered-document
ai.provider=${AI_PROVIDER:ollama}

gemini.api.key=${GEMINI_API_KEY:}
gemini.chat.model=${GEMINI_CHAT_MODEL:gemini-2.0-flash}
gemini.embedding.model=${GEMINI_EMBEDDING_MODEL:text-embedding-004}

ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.chat.model=${OLLAMA_CHAT_MODEL:llama3.2}
ollama.embedding.model=${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

jwt.secret=${JWT_SECRET:01234567890123456789012345678901}
server.port=${SERVER_PORT:8080}

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DataSource Settings
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:aidb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Frontend URL (for redirects after OAuth)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

